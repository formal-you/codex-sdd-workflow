name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install PyYAML

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run skill static validation
        run: python scripts/run_skill_validation.py --skip-tests --force-local-validation
